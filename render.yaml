services:
  - type: web
    name: elec-ai-chat
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_STATE_TABLE
        value: app_state
      - key: SUPABASE_STORAGE_MODE
        value: state
      - key: APP_ORIGIN
        value: https://elec-ai-chat.onrender.com
      - key: MAX_JSON_BODY_BYTES
        value: "1200000"
      - key: MAX_IMAGE_JSON_BODY_BYTES
        value: "9000000"
      - key: MAX_DATA_IMAGE_BYTES
        value: "6500000"
      - key: FREE_DAILY_LIMIT
        value: "10"
      - key: ANON_DAILY_LIMIT
        value: "5"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: OPENAI_SEARCH_MODEL
        value: gpt-5.5
      - key: OPENAI_REASONING_EFFORT
        value: medium
      - key: OPENAI_EXPERT_REASONING_EFFORT
        value: high
      - key: OPENAI_TEXT_VERBOSITY
        value: medium
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ACCESS_CODE
        sync: false
